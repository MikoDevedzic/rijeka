[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — force=false means static files in dist/ are served first
# xva.html exists in dist/ so Netlify serves it directly, no rewrite needed
[[redirects]]
  from  = "/*"
  to    = "/index.html"
  status = 200
  force  = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
