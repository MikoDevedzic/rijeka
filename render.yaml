services:
  - type: web
    name: rijeka-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://app.rijeka.app
